site_name: RAS Commander MCP
site_url: https://rascommander.info/mcp/
site_description: Model Context Protocol (MCP) server for querying HEC-RAS projects via ras-commander.
repo_url: https://github.com/gpt-cmdr/ras-commander-mcp
repo_name: gpt-cmdr/ras-commander-mcp
docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle: {icon: material/brightness-7, name: Switch to dark mode}
    - scheme: slate
      primary: blue
      accent: light blue
      toggle: {icon: material/brightness-4, name: Switch to light mode}
  features:
    - navigation.top
    - navigation.sections
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/clb-branding.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Tools: tools.md
